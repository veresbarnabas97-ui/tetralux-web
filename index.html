<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TetraLux (TLX) | Presale Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/@solana/web3.js@1.88.0/lib/index.iife.min.js"></script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .neon-border { border: 1px solid rgba(52, 211, 153, 0.3); box-shadow: 0 0 20px rgba(52, 211, 153, 0.1); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <div class="max-w-md w-full glass p-8 rounded-[2rem] text-center neon-border">
    <div class="mb-6">
        <h1 class="text-4xl font-bold tracking-tighter text-white">TETRA<span class="text-emerald-400">LUX</span></h1>
        <div class="inline-block px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-[10px] text-emerald-400 font-bold mt-2 uppercase tracking-widest">
            Devnet Live
        </div>
    </div>

    <div class="space-y-4 mb-8">
      <div class="bg-black/30 p-4 rounded-2xl border border-white/5 text-left transition-all focus-within:border-emerald-500/50">
        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">You Pay (SOL)</label>
        <input type="number" id="sol-input" value="0.1" step="0.1" class="w-full bg-transparent text-2xl font-bold outline-none text-white">
      </div>
      
      <div class="flex justify-center -my-2 relative z-10">
          <div class="bg-slate-800 p-2 rounded-full border border-white/10">
              <i class="fa-solid fa-arrow-down text-emerald-400"></i>
          </div>
      </div>

      <div class="bg-black/30 p-4 rounded-2xl border border-white/5 text-left">
        <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">You Receive (TLX)</label>
        <input type="text" id="tlx-output" readonly value="100,000" class="w-full bg-transparent text-2xl font-bold outline-none text-emerald-400">
      </div>
    </div>

    <button id="buy-btn" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-slate-900 font-black py-4 rounded-2xl transition-all shadow-xl shadow-emerald-500/20 active:scale-95">
      CONNECT WALLET
    </button>

    <div class="mt-8 grid grid-cols-2 gap-2 text-[9px] text-gray-500">
        <div class="bg-white/5 p-2 rounded-lg">
            <p class="font-bold text-gray-400 uppercase">Rate</p>
            <p>1 SOL = 1M TLX</p>
        </div>
        <div class="bg-white/5 p-2 rounded-lg">
            <p class="font-bold text-gray-400 uppercase">Network</p>
            <p>Solana Devnet</p>
        </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      PROGRAM_ID: "H1PnBZWcStmBiUXLAAi2ReUfU8u2Bx92ZyQ4gXUqRxoc",
      ADMIN_WALLET: "4iubzdpP14Mo32iRseD7nZEhP1RVLWjjwbsh228uBk3z",
      TOKEN_MINT: "2MAEnm1q2Sfqd1QdPT7xk3w4TSvHh5xN2kPXMTnivNn5",
      VAULT: "2wWGWmd6MZGKe9nLA6f9AkxgRha5VpgnpCN9S78ej9q8",
      RPC_URL: "https://api.devnet.solana.com",
      RATE: 1000000
    };

    let wallet = null;

    async function connect() {
      if (window.solana) {
        try {
          const resp = await window.solana.connect();
          wallet = resp.publicKey.toString();
          document.getElementById('buy-btn').innerText = "BUY TLX NOW";
        } catch (e) { console.error("Connection failed"); }
      } else {
        alert("Phantom Wallet not found!");
      }
    }

    document.getElementById('sol-input').oninput = (e) => {
      const val = parseFloat(e.target.value) || 0;
      document.getElementById('tlx-output').value = (val * CONFIG.RATE).toLocaleString();
    };

    async function handleTransaction() {
      if (!wallet) return connect();
      
      const solAmount = document.getElementById('sol-input').value;
      const connection = new solanaWeb3.Connection(CONFIG.RPC_URL, "confirmed");
      const buyer = new solanaWeb3.PublicKey(wallet);
      const admin = new solanaWeb3.PublicKey(CONFIG.ADMIN_WALLET);

      try {
        const tx = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: buyer,
            toPubkey: admin,
            lamports: solAmount * solanaWeb3.LAMPORTS_PER_SOL
          })
        );

        const { blockhash } = await connection.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = buyer;

        const signed = await window.solana.signTransaction(tx);
        const signature = await connection.sendRawTransaction(signed.serialize());
        alert("Transaction Sent! Signature: " + signature.slice(0, 8));
        
        await connection.confirmTransaction(signature);
        alert("Success! SOL received by Admin. (A tokenküldéshez hívd meg a claim függvényt vagy automatizáld)");
      } catch (err) {
        console.error(err);
        alert("Transaction failed!");
      }
    }

    document.getElementById('buy-btn').onclick = handleTransaction;
  </script>
</body>
</html>
