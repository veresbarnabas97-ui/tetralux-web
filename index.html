<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TetraLux Presale</title>
    <script src="https://unpkg.com/@solana/web3.js@1.88.0/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@coral-xyz/anchor@0.28.0/dist/anchor.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-lg mx-auto bg-slate-800 p-8 rounded-2xl shadow-xl border border-emerald-500/30">
        <h1 class="text-3xl font-bold text-emerald-400 mb-6 text-center">TLX Presale</h1>
        
        <div class="mb-6 space-y-2">
            <p class="text-sm text-gray-400">Vault Egyenleg: <span class="text-white font-bold">40,000,000 TLX</span></p>
            <p class="text-sm text-gray-400">Ár: <span class="text-white">1 SOL = 1,000,000 TLX</span></p>
        </div>

        <input type="number" id="sol-input" placeholder="SOL mennyiség (pl. 0.1)" 
               class="w-full p-4 rounded-xl bg-slate-900 border border-gray-700 mb-4 focus:border-emerald-500 outline-none">
        
        <button id="buy-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
            Vásárlás
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium"></div>
    </div>

    <script>
        const CONFIG = {
            RPC_URL: "https://api.devnet.solana.com",
            PROGRAM_ID: "H1PnBZWcStmBiUXLAAi2ReUfU8u2Bx92ZyQ4gXUqRxoc",
            PRESALE_CONFIG: "27Vt8ZzrgW519vxJYqCnrC3wP4cm4E3gfgHNAYHuE93r",
            TOKEN_VAULT: "2wWGWmd6MZGKe9nLA6f9AkxgRha5VpgnpCN9S78ej9q8",
            TOKEN_MINT: "2MAEnm1q2Sfqd1QdPT7xk3w4TSvHh5xN2kPXMTnivNn5",
            ADMIN_WALLET: "6fmSjLQJN7DHivA1f7mh3CqyDTMbXSZxDtqvfUK9M9qU" // Ez a Playground tárcád címe
        };

        const IDL = {
            "version": "0.1.0",
            "name": "tetralux_presale",
            "instructions": [
                {
                    "name": "buyTokens",
                    "accounts": [
                        { "name": "buyer", "isMut": true, "isSigner": true },
                        { "name": "adminWallet", "isMut": true, "isSigner": false },
                        { "name": "buyerTokenAccount", "isMut": true, "isSigner": false },
                        { "name": "presaleTokenVault", "isMut": true, "isSigner": false },
                        { "name": "presaleAuthority", "isMut": false, "isSigner": false },
                        { "name": "presaleConfig", "isMut": true, "isSigner": false },
                        { "name": "tokenProgram", "isMut": false, "isSigner": false },
                        { "name": "systemProgram", "isMut": false, "isSigner": false }
                    ],
                    "args": [{ "name": "solAmount", "type": "u64" }]
                }
            ]
        };

        async function buyTokens() {
            const status = document.getElementById('status');
            if (!window.solana) return alert("Telepítsd a Phantom Walletet!");

            try {
                status.innerText = "Csatlakozás...";
                const resp = await window.solana.connect();
                const buyerPubKey = resp.publicKey;

                const conn = new solanaWeb3.Connection(CONFIG.RPC_URL);
                const provider = new anchor.AnchorProvider(conn, window.solana, { commitment: "confirmed" });
                const program = new anchor.Program(IDL, CONFIG.PROGRAM_ID, provider);

                const solAmount = parseFloat(document.getElementById('sol-input').value);
                if (!solAmount) return alert("Adj meg egy összeget!");

                // PDA kiszámítása
                const [presaleAuth] = solanaWeb3.PublicKey.findProgramAddressSync(
                    [Buffer.from("presale_authority")],
                    program.programId
                );

                // Vevő Token tárcája (ATA)
                const TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey('TokenkegQfeZyiNwAJsyFbPVwwQQfuj5WNvxKX2B5C');
                const ASSOCIATED_TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey('ATokenGPvbdGVqstVQmcLsNZAqeEBZvUKeS5apSnUUp9J');
                
                const [buyerATA] = solanaWeb3.PublicKey.findProgramAddressSync(
                    [buyerPubKey.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), new solanaWeb3.PublicKey(CONFIG.TOKEN_MINT).toBuffer()],
                    ASSOCIATED_TOKEN_PROGRAM_ID
                );

                status.innerText = "Tranzakció jóváhagyása...";
                
                await program.methods
                    .buyTokens(new anchor.BN(solAmount * solanaWeb3.LAMPORTS_PER_SOL))
                    .accounts({
                        buyer: buyerPubKey,
                        adminWallet: new solanaWeb3.PublicKey(CONFIG.ADMIN_WALLET),
                        buyerTokenAccount: buyerATA,
                        presaleTokenVault: new solanaWeb3.PublicKey(CONFIG.TOKEN_VAULT),
                        presaleAuthority: presaleAuth,
                        presaleConfig: new solanaWeb3.PublicKey(CONFIG.PRESALE_CONFIG),
                        tokenProgram: TOKEN_PROGRAM_ID,
                        systemProgram: solanaWeb3.SystemProgram.programId,
                    })
                    .rpc();

                status.className = "mt-4 text-center text-emerald-400 font-bold";
                status.innerText = "Sikeres vásárlás!";
            } catch (err) {
                console.error(err);
                status.className = "mt-4 text-center text-red-400";
                status.innerText = "Hiba: " + err.message;
            }
        }

        document.getElementById('buy-btn').onclick = buyTokens;
    </script>
</body>
</html>
