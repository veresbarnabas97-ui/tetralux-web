<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a"> 
    <title>TetraLux (TLX) | Ethical DeFi on Solana</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script src="https://unpkg.com/@project-serum/anchor@latest/dist/browser/anchor.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        window.Buffer = buffer.Buffer;
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        solana: '#9945FF',
                        emerald: { 400: '#34d399', 500: '#10b981', 900: '#064e3b' },
                        gold: '#fbbf24'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Rajdhani', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #34d399, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #mobile-menu {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0; opacity: 0; overflow: hidden;
        }
        #mobile-menu.open { max-height: 400px; opacity: 1; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-50 glass-panel border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center">
                    <span class="text-3xl font-display font-bold text-emerald-400">TETRA<span class="text-white">LUX</span></span>
                </div>
                
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="#about" class="hover:text-emerald-400 px-3 py-2 rounded-md text-sm font-medium transition">About</a>
                        <a href="#presale" class="hover:text-emerald-400 px-3 py-2 rounded-md text-sm font-medium transition text-emerald-400">Presale</a>
                        <a href="#tokenomics" class="hover:text-emerald-400 px-3 py-2 rounded-md text-sm font-medium transition">Tokenomics</a>
                        <a href="#nft" class="hover:text-yellow-400 px-3 py-2 rounded-md text-sm font-medium transition">NFT</a>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button id="connect-wallet-btn" class="hidden md:block bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800 text-white font-bold py-2 px-6 rounded-full transition transform hover:scale-105 shadow-lg border border-emerald-400">
                        <i class="fa-solid fa-wallet mr-2"></i> <span class="wallet-label">Connect</span>
                    </button>
                    <button id="mobile-menu-btn" class="md:hidden text-gray-300 hover:text-white p-2">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="md:hidden bg-[#0f172a] border-b border-gray-800 text-center">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="#about" class="mobile-link block py-4 text-base font-medium">About</a>
                <a href="#presale" class="mobile-link block py-4 text-base font-medium text-emerald-400">Presale</a>
                <a href="#tokenomics" class="mobile-link block py-4 text-base font-medium">Tokenomics</a>
                <button id="connect-wallet-mobile" class="w-full mt-2 bg-emerald-600 text-white font-bold py-3 rounded-lg">
                    <i class="fa-solid fa-wallet mr-2"></i> <span class="wallet-label">Connect Wallet</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="relative pt-32 pb-10 lg:pt-48 overflow-hidden" id="about">
        <div class="max-w-7xl mx-auto px-4 text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-display font-bold mb-6 leading-tight">
                Ethical DeFi Ecosystem <br>
                <span class="gradient-text">On Solana</span>
            </h1>
            <p class="mt-4 max-w-2xl mx-auto text-xl text-gray-300">Stability. Passive Income. Community.</p>
            <div class="mt-10 flex flex-col sm:flex-row justify-center gap-4">
                <a href="#presale" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-lg shadow-lg transition">Join Presale</a>
                <a href="#" class="glass-panel hover:bg-white/10 text-white font-bold py-4 px-8 rounded-lg border border-gray-600 transition">Whitepaper</a>
            </div>
        </div>
    </section>

    <section id="presale" class="py-20 relative">
        <div class="max-w-7xl mx-auto px-4">
            <div class="w-full max-w-xl mx-auto glass-panel p-8 rounded-3xl border border-emerald-500/30 shadow-2xl">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-display font-bold text-white mb-2 uppercase tracking-wide">Presale is Live</h2>
                    <p class="text-sm text-emerald-400 font-semibold italic">1 SOL = 1,000,000 TLX</p>
                </div>

                <div class="space-y-4 mb-8">
                    <div class="bg-black/40 p-4 rounded-2xl border border-gray-700">
                        <div class="flex justify-between text-xs text-gray-400 mb-2">
                            <span>You Send (SOL)</span>
                            <span>Balance: <span id="sol-balance">0.00</span></span>
                        </div>
                        <div class="flex items-center">
                            <input type="number" id="sol-input" placeholder="0.0" step="0.1" class="w-full bg-transparent text-3xl font-bold text-white outline-none">
                            <span class="text-xl font-bold ml-2">SOL</span>
                        </div>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-gray-700">
                        <div class="text-xs text-gray-400 mb-2">You Receive (TLX)</div>
                        <div class="flex items-center">
                            <input type="text" id="tlx-output" readonly placeholder="0" class="w-full bg-transparent text-3xl font-bold text-emerald-400 outline-none">
                            <span class="text-xl font-bold ml-2 text-emerald-400">TLX</span>
                        </div>
                    </div>
                </div>

                <button id="buy-btn" disabled class="w-full bg-gray-700 text-gray-400 font-bold py-4 rounded-xl transition cursor-not-allowed uppercase tracking-widest">
                    Connect Wallet to Buy
                </button>
            </div>
        </div>
    </section>

    <script>
        // --- KONFIGURÁCIÓ & SOLANA LOGIKA ---
        const PROGRAM_ID = new anchor.web3.PublicKey("H1xcQBvXT2hrFKDEoYxyvR6Zpyk1SZRVhwVfYgdpNuFb");
        const ADMIN_WALLET = new anchor.web3.PublicKey("4iubzdpP14Mo32iRseD7nZEhP1RVLWjjwbsh228uBk3z");
        const TOKEN_MINT = new anchor.web3.PublicKey("5vxfqnLVETP6xqZAjebckEbRCkwyzHFoDUoBjXhxEqA3");
        const PRESALE_STATE = new anchor.web3.PublicKey("E8tLriUmunHVVPFS65E3rgzR2f1Smb2x7U2x9CBM1CQV");
        const RATE = 1000000;
        
        const IDL = {
            "version": "0.1.0", "name": "tetralux_presale",
            "instructions": [
                { "name": "buyTokens", "accounts": [{ "name": "presaleState", "isMut": true }, { "name": "adminWallet", "isMut": true }, { "name": "user", "isMut": true, "isSigner": true }, { "name": "vaultTokenAccount", "isMut": true }, { "name": "userTokenAccount", "isMut": true }, { "name": "vaultAuthority", "isMut": false }, { "name": "tokenProgram", "isMut": false }], "args": [{ "name": "solAmount", "type": "u64" }] }
            ]
        };

        let provider, program;
        const solInput = document.getElementById('sol-input');
        const tlxOutput = document.getElementById('tlx-output');
        const buyBtn = document.getElementById('buy-btn');

        // Kalkulátor
        solInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            tlxOutput.value = isNaN(val) ? "" : (val * RATE).toLocaleString();
            updateBuyButtonStatus();
        });

        async function updateBuyButtonStatus() {
            const isConnected = window.solana && window.solana.isConnected;
            const labels = document.querySelectorAll('.wallet-label');
            
            if (isConnected) {
                const val = parseFloat(solInput.value);
                if (val >= 0.01) {
                    buyBtn.disabled = false;
                    buyBtn.innerText = "Buy TLX Now";
                    buyBtn.className = "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-500/20 cursor-pointer uppercase";
                } else {
                    buyBtn.disabled = true;
                    buyBtn.innerText = "Enter Amount (Min 0.01)";
                    buyBtn.className = "w-full bg-gray-700 text-gray-400 font-bold py-4 rounded-xl cursor-not-allowed uppercase";
                }
            }
        }

        async function connect() {
            if (!window.solana) return alert("Phantom Wallet not found!");
            try {
                const resp = await window.solana.connect();
                const connection = new anchor.web3.Connection(anchor.web3.clusterApiUrl('devnet'), "confirmed");
                provider = new anchor.AnchorProvider(window.solana, connection, { preflightCommitment: "confirmed" });
                program = new anchor.Program(IDL, PROGRAM_ID, provider);

                const balance = await connection.getBalance(resp.publicKey);
                document.getElementById('sol-balance').innerText = (balance / 1e9).toFixed(3);
                
                const shortKey = resp.publicKey.toString().slice(0, 4) + '...' + resp.publicKey.toString().slice(-4);
                document.querySelectorAll('.wallet-label').forEach(el => el.innerText = shortKey);
                
                updateBuyButtonStatus();
            } catch (err) { console.error(err); }
        }

        document.getElementById('connect-wallet-btn').addEventListener('click', connect);
        document.getElementById('connect-wallet-mobile').addEventListener('click', connect);

        buyBtn.addEventListener('click', async () => {
            const amount = parseFloat(solInput.value);
            buyBtn.innerText = "Processing...";
            buyBtn.disabled = true;

            try {
                const lamports = new anchor.BN(amount * 1e9);
                const [vaultAuth] = await anchor.web3.PublicKey.findProgramAddress([Buffer.from("presale_vault")], PROGRAM_ID);
                const userATA = await anchor.utils.token.associatedAddress({ mint: TOKEN_MINT, owner: provider.wallet.publicKey });
                const vaultATA = await anchor.utils.token.associatedAddress({ mint: TOKEN_MINT, owner: vaultAuth });

                const tx = await program.methods.buyTokens(lamports).accounts({
                    presaleState: PRESALE_STATE,
                    adminWallet: ADMIN_WALLET,
                    user: provider.wallet.publicKey,
                    vaultTokenAccount: vaultATA,
                    userTokenAccount: userATA,
                    vaultAuthority: vaultAuth,
                    tokenProgram: anchor.utils.token.TOKEN_PROGRAM_ID,
                }).rpc();

                alert("Success! Tx ID: " + tx);
                location.reload();
            } catch (err) {
                alert("Error: " + (err.msg || "Check console"));
                updateBuyButtonStatus();
            }
        });

        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileMenuBtn.addEventListener('click', () => mobileMenu.classList.toggle('open'));
    </script>
</body>
</html>
