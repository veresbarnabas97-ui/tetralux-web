<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="TetraLux (TLX) - Ethical DeFi on Solana. Stability, Passive Income, Community.">
  <title>TetraLux (TLX) | Ethical DeFi on Solana</title>

  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@solana/web3.js@1.88.0/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            solana: '#9945FF',
            emerald: { 400: '#34d399', 500: '#10b981', 900: '#064e3b' },
            gold: '#fbbf24'
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Rajdhani', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; }
    .glass-panel { background: rgba(255,255,255,0.04); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);}
    .gradient-text { background: linear-gradient(to right, #34d399, #fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
    #mobile-menu { transition: max-height 0.3s, opacity 0.3s; max-height:0; opacity:0; overflow: hidden;}
    #mobile-menu.open { max-height: 400px; opacity: 1;}
    .notification { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; font-weight: 600; z-index: 9999; animation: fadeIn .3s;}
    .notification.success { background: #10b981; color: white; }
    .notification.error { background: #ef4444; color: white; }
    .notification.info { background: #3b82f6; color: white; }
    @keyframes fadeIn {from{opacity:0;transform: translateY(40px);} to{opacity:1;transform:none;}}
    .notification.exit { animation: fadeOut 0.3s forwards;}
    @keyframes fadeOut {to{opacity:0;transform: translateX(100px);}}
  </style>
</head>
<body class="antialiased">
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-[-1] pointer-events-none">
    <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-solana rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
  </div>

  <nav class="fixed w-full z-50 glass-panel border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <span class="text-3xl font-display font-bold text-emerald-400">TETRA<span class="text-white">LUX</span></span>
      <div class="hidden md:flex space-x-8">
        <a href="#about" class="hover:text-emerald-400 transition">About</a>
        <a href="#tokenomics" class="hover:text-emerald-400 transition">Tokenomics</a>
        <a href="#roadmap" class="hover:text-emerald-400 transition">Roadmap</a>
      </div>
      <button id="connect-wallet-btn" class="bg-gradient-to-r from-emerald-500 to-emerald-700 text-white font-bold py-2 px-6 rounded-full">
        <i class="fa-solid fa-wallet mr-2"></i> Connect
      </button>
    </div>
  </nav>

  <section class="pt-48 pb-32 text-center" id="about">
    <h1 class="text-5xl md:text-7xl font-display font-bold mb-6">
      Ethical DeFi <span class="gradient-text">On Solana</span>
    </h1>
    <p class="text-xl text-gray-300 max-w-2xl mx-auto mb-10">Stability. Passive Income. Community. Join the sustainable DeFi revolution.</p>
    <button id="open-presale-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-12 rounded-lg text-lg transition shadow-xl">
      Join Presale
    </button>
  </section>

  <!-- Presale Modal -->
  <div id="presale-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="relative w-full max-w-lg glass-panel rounded-3xl p-8">
      <button id="close-presale" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
      <h2 class="text-3xl font-display font-bold text-center mb-6">Presale is Live</h2>
      
      <div class="space-y-4">
        <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-700">
          <label class="text-xs text-gray-400 block mb-2">You Send (SOL)</label>
          <input type="number" id="sol-input" placeholder="0.1" step="0.1" class="w-full bg-transparent text-2xl font-bold outline-none">
          <p class="text-[10px] text-gray-500 mt-1">Balance: <span id="sol-balance">0.00</span> SOL</p>
        </div>
        <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-700">
          <label class="text-xs text-gray-400 block mb-2">You Receive (TLX)</label>
          <input type="text" id="tlx-output" placeholder="100,000" readonly class="w-full bg-transparent text-2xl font-bold text-emerald-400 outline-none">
        </div>
        <button id="buy-btn" disabled class="w-full bg-gray-700 text-gray-400 font-bold py-4 rounded-xl uppercase tracking-widest transition">
          Connect Wallet to Buy
        </button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      NETWORK: "devnet",
      RPC_URL: "https://api.devnet.solana.com",
      PROGRAM_ID: "ADU7hHFKmQcUs9tFNxzjDdUvkPvuhimkcPXKVFS5tXG5",
      TOKEN_MINT: "BPk4cKiNm3DovoHGbfTbsGabAVxsbyHHe3tLFq8rkaib",
      ADMIN_WALLET: "4iubzdpP14Mo32iRseD7nZEhP1RVLWjjwbsh228uBk3z",
      RATE: 1000000
    };

    let userWallet = null;

    function notify(msg, type='info') {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => { n.classList.add('exit'); setTimeout(() => n.remove(), 300); }, 3000);
    }

    async function connect() {
      if (!window.solana) return window.open('https://phantom.app/', '_blank');
      const resp = await window.solana.connect();
      userWallet = resp.publicKey;
      document.getElementById('connect-wallet-btn').innerText = userWallet.toString().slice(0,6) + '...';
      const conn = new solanaWeb3.Connection(CONFIG.RPC_URL);
      const bal = await conn.getBalance(userWallet);
      document.getElementById('sol-balance').innerText = (bal / 1e9).toFixed(3);
      const buyBtn = document.getElementById('buy-btn');
      buyBtn.disabled = false;
      buyBtn.innerText = "Buy TLX";
      buyBtn.className = "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition";
      notify("Wallet Connected!", "success");
    }

    async function buy() {
      try {
        const amount = parseFloat(document.getElementById('sol-input').value);
        if (!amount || amount <= 0) return notify("Enter valid amount", "error");

        const conn = new solanaWeb3.Connection(CONFIG.RPC_URL, 'confirmed');
        const programId = new solanaWeb3.PublicKey(CONFIG.PROGRAM_ID);
        const mint = new solanaWeb3.PublicKey(CONFIG.TOKEN_MINT);
        const admin = new solanaWeb3.PublicKey(CONFIG.ADMIN_WALLET);

        // PDA deriválás
        const [vaultPda] = solanaWeb3.PublicKey.findProgramAddressSync([TextEncoder().encode("presale")], programId);
        const vaultAta = solanaWeb3.PublicKey.findProgramAddressSync(
          [vaultPda.toBuffer(), new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA").toBuffer(), mint.toBuffer()],
          new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL")
        )[0];
        
        const buyerAta = solanaWeb3.PublicKey.findProgramAddressSync(
          [userWallet.toBuffer(), new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA").toBuffer(), mint.toBuffer()],
          new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL")
        )[0];

        const tx = new solanaWeb3.Transaction();

        // ATA létrehozása ha kell
        const info = await conn.getAccountInfo(buyerAta);
        if (!info) {
          tx.add(solanaWeb3.SystemProgram.transfer({ from: userWallet, to: userWallet, lamports: 0 })); // Dummy for blockhash
          tx.add(window.splToken.createAssociatedTokenAccountInstruction(userWallet, buyerAta, userWallet, mint));
        }

        // Anchor Discriminator ("global:buy_tokens")
        const disc = new Uint8Array([102, 6, 61, 18, 1, 218, 235, 234]);
        const data = new Uint8Array(16);
        data.set(disc);
        new DataView(data.buffer).setBigUint64(8, BigInt(Math.floor(amount * 1e9)), true);

        tx.add(new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: userWallet, isSigner: true, isWritable: true },
            { pubkey: admin, isSigner: false, isWritable: true },
            { pubkey: vaultPda, isSigner: false, isWritable: false },
            { pubkey: vaultAta, isSigner: false, isWritable: true },
            { pubkey: buyerAta, isSigner: false, isWritable: true },
            { pubkey: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"), isSigner: false, isWritable: false },
            { pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false }
          ],
          programId, data
        }));

        const { blockhash } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = userWallet;

        const signed = await window.solana.signTransaction(tx);
        const sig = await conn.sendRawTransaction(signed.serialize());
        notify("Transaction sent! Confirming...", "info");
        await conn.confirmTransaction(sig);
        notify("Purchase Successful!", "success");
      } catch (e) { notify(e.message, "error"); }
    }

    document.getElementById('connect-wallet-btn').onclick = connect;
    document.getElementById('buy-btn').onclick = buy;
    document.getElementById('open-presale-btn').onclick = () => document.getElementById('presale-modal').classList.remove('hidden');
    document.getElementById('close-presale').onclick = () => document.getElementById('presale-modal').classList.add('hidden');
    document.getElementById('sol-input').oninput = (e) => document.getElementById('tlx-output').value = (e.target.value * CONFIG.RATE).toLocaleString();
  </script>
</body>
</html>
