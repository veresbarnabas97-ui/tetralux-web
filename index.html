<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TetraLux (TLX) | Presale</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Solana Web3, Anchor & SPL Token -->
  <script src="https://unpkg.com/@solana/web3.js@1.88.0/lib/index.iife.min.js"></script>
  <script src="https://unpkg.com/@coral-xyz/anchor@0.28.0/dist/anchor.umd.js"></script>
  <script src="https://unpkg.com/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { solana: '#9945FF', emerald: { 400: '#34d399', 500: '#10b981', 900: '#064e3b' }, gold: '#fbbf24' }, fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Rajdhani', 'sans-serif'] } } } }
  </script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; }
    .glass-panel { background: rgba(255,255,255,0.04); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);}
    .notification { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; font-weight: 600; z-index: 9999; color: white; box-shadow: 0 4px 24px #0009; animation: fadeIn .3s;}
    .notification.success { background: #10b981; } .notification.error { background: #ef4444;} .notification.warning { background: #f59e0b;} .notification.info { background: #3b82f6;}
    @keyframes fadeIn {from{opacity:0;transform: translateY(40px);} to{opacity:1;transform:none;}}
    .notification.exit { animation: fadeOut 0.3s forwards;}
    @keyframes fadeOut {to{opacity:0;transform: translateX(100px);}}
  </style>
</head>
<body class="antialiased">

  <!-- EGYSZERŰSÍTETT NAVIGÁCIÓ -->
  <nav class="fixed w-full z-50 glass-panel border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <div class="text-3xl font-display font-bold text-emerald-400">TETRA<span class="text-white">LUX</span></div>
        <button id="connect-wallet-btn" class="bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800 text-white font-bold py-2 px-6 rounded-full transition">
          <i class="fa-solid fa-wallet mr-2"></i> Connect
        </button>
      </div>
    </div>
  </nav>

  <!-- PRESALE HERO -->
  <section class="relative pt-32 pb-20 text-center">
    <h1 class="text-5xl md:text-7xl font-display font-bold mb-6 text-white">Join the <span class="text-emerald-400">Presale</span></h1>
    <button id="open-presale-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-lg shadow-lg transition mt-4">Open Dashboard</button>
  </section>

  <!-- PRESALE MODAL -->
  <div id="presale-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="relative w-full max-w-lg glass-panel rounded-3xl border border-emerald-500/30 p-8">
      <button id="close-presale" class="absolute top-4 right-4 text-gray-400 hover:text-white transition">
        <i class="fa-solid fa-xmark text-2xl"></i>
      </button>
      <div class="text-center mb-6">
        <h2 class="text-3xl font-display font-bold text-white mb-2">Presale is Live</h2>
        <p class="text-xs mt-2">Network: <span id="network-label" class="text-emerald-400 font-bold">Solana Devnet</span></p>
      </div>

      <!-- Inputs -->
      <div class="space-y-4 mb-6">
        <div class="bg-gray-900/50 rounded-2xl p-4 border border-gray-700">
          <div class="flex justify-between text-xs text-gray-400 mb-2">
            <span>You Send</span>
            <span>Balance: <span id="sol-balance">0.00</span> SOL</span>
          </div>
          <input type="number" id="sol-input" placeholder="0.0" step="0.01" min="0.01" class="w-full bg-transparent text-3xl font-bold text-white outline-none">
        </div>
        <div class="bg-gray-900/50 rounded-2xl p-4 border border-gray-700">
          <div class="flex justify-between text-xs text-gray-400 mb-2">
            <span>You Receive (1 SOL = 1,000,000 TLX)</span>
          </div>
          <input type="text" id="tlx-output" placeholder="0" readonly class="w-full bg-transparent text-3xl font-bold text-emerald-400 outline-none">
        </div>
      </div>
      
      <button id="buy-btn" disabled class="w-full bg-gray-700 text-gray-400 font-bold py-4 rounded-xl transition cursor-not-allowed uppercase">
        Connect Wallet to Buy
      </button>
    </div>
  </div>

  <!-- JAVASCRIPT LOGIKA -->
  <script>
    // ===================== KONFIGURÁCIÓ (Később töltjük ki a Playgroundból) =====================
    const CONFIG = {
      NETWORK: "devnet",
      PRESALE_PROGRAM_ID: "IDE_JON_A_PROGRAM_ID", // Ezt kapjuk az Anchor build után
      TOKEN_MINT: "IDE_JON_A_TLX_MINT",           // Ezt generáljuk CLI-ben
      ADMIN_WALLET: "IDE_JON_AZ_ADMIN_TARCA",     // A te Phantom címed
      EXCHANGE_RATE: 1000000,
      RPC_URL: "https://api.devnet.solana.com"
    };

    // ===================== IDL (Később másoljuk be a target/idl/ mappából) =====================
    const PRESALE_IDL = {
      version: "0.1.0",
      name: "tlx_presale",
      instructions: [
        {
          name: "buyTokens",
          accounts: [
            { name: "buyer", isSigner: true, isWritable: true },
            { name: "admin", isSigner: false, isWritable: true },
            { name: "systemProgram", isSigner: false, isWritable: false }
          ],
          args: [{ name: "solAmount", type: "u64" }]
        }
      ]
    };

    let walletConnected = false;
    let userPublicKey = null;

    // UI Segédfüggvények
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      setTimeout(() => { notification.classList.add('exit'); setTimeout(() => notification.remove(), 300); }, 3000);
    }

    // Tárca csatlakoztatása
    async function handleConnect() {
      try {
        if ('solana' in window && window.solana?.isPhantom) {
          const resp = await window.solana.connect();
          userPublicKey = resp.publicKey.toString();
          walletConnected = true;
          
          const connection = new window.solanaWeb3.Connection(CONFIG.RPC_URL);
          const balance = await connection.getBalance(resp.publicKey);
          document.getElementById('sol-balance').textContent = (balance / window.solanaWeb3.LAMPORTS_PER_SOL).toFixed(2);
          
          const btn = document.getElementById('connect-wallet-btn');
          btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> ${userPublicKey.slice(0,4)}...${userPublicKey.slice(-4)}`;
          document.getElementById('buy-btn').innerText = 'Enter Amount';
          showNotification('Wallet Connected!', 'success');
        } else {
          window.open('https://phantom.app/', '_blank');
        }
      } catch (error) { showNotification('Connection failed.', 'error'); }
    }

    // Token Vásárlás (Anchor Logika)
    async function presaleBuy(solAmount) {
      const buyBtn = document.getElementById('buy-btn');
      buyBtn.disabled = true; buyBtn.innerText = 'Processing...';

      try {
        const connection = new window.solanaWeb3.Connection(CONFIG.RPC_URL);
        const provider = new window.anchor.AnchorProvider(
          connection, 
          window.solana, 
          { preflightCommitment: "processed" }
        );
        window.anchor.setProvider(provider);

        // Itt inicializáljuk az Okos Szerződést
        const programId = new window.solanaWeb3.PublicKey(CONFIG.PRESALE_PROGRAM_ID);
        const program = new window.anchor.Program(PRESALE_IDL, programId, provider);
        
        const lamports = new window.anchor.BN(solAmount * window.solanaWeb3.LAMPORTS_PER_SOL);

        showNotification('Approve transaction in Phantom...', 'info');

        // Tranzakció küldése (Rust "buy_tokens" metódus hívása)
        const tx = await program.methods.buyTokens(lamports)
          .accounts({
            buyer: provider.wallet.publicKey,
            admin: new window.solanaWeb3.PublicKey(CONFIG.ADMIN_WALLET),
            systemProgram: window.solanaWeb3.SystemProgram.programId,
          })
          .rpc();

        showNotification(`✓ Success! Tx: ${tx.slice(0, 8)}...`, 'success');
        document.getElementById('sol-input').value = '';
        document.getElementById('tlx-output').value = '';

      } catch (error) {
        console.error(error);
        showNotification(`Failed: ${error.message}`, 'error');
      } finally {
        buyBtn.disabled = false; buyBtn.innerText = 'Buy TLX';
      }
    }

    // Eseménykezelők
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('connect-wallet-btn').onclick = handleConnect;
      document.getElementById('open-presale-btn').onclick = () => document.getElementById('presale-modal').classList.remove('hidden');
      document.getElementById('close-presale').onclick = () => document.getElementById('presale-modal').classList.add('hidden');
      
      const solInput = document.getElementById('sol-input');
      solInput.oninput = () => {
        const val = parseFloat(solInput.value);
        if (!isNaN(val) && val > 0) {
          document.getElementById('tlx-output').value = (val * CONFIG.EXCHANGE_RATE).toLocaleString();
          if (walletConnected) {
            const buyBtn = document.getElementById('buy-btn');
            buyBtn.disabled = false;
            buyBtn.className = 'w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition shadow-lg uppercase';
            buyBtn.innerText = 'Buy TLX';
          }
        }
      };

      document.getElementById('buy-btn').onclick = () => {
        if (!walletConnected) return showNotification('Connect wallet first', 'warning');
        const solAmount = parseFloat(solInput.value);
        if (solAmount > 0) presaleBuy(solAmount);
      };
    });
  </script>
</body>
</html>
