<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TetraLux (TLX) | Join Presale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script src="https://unpkg.com/@project-serum/anchor@latest/dist/browser/anchor.min.js"></script>

    <script>
        window.Buffer = buffer.Buffer;
        tailwind.config = {
            theme: {
                extend: {
                    colors: { solana: '#9945FF', emerald: { 400: '#34d399', 500: '#10b981' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Rajdhani', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-[-1]">
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-emerald-500 rounded-full filter blur-[100px] opacity-20"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-solana rounded-full filter blur-[100px] opacity-20"></div>
    </div>

    <nav class="w-full z-50 glass-panel border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="text-2xl font-display font-bold text-emerald-400 tracking-tighter">TETRA<span class="text-white">LUX</span></div>
            <button id="wallet-btn" class="bg-gradient-to-r from-emerald-500 to-emerald-700 text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition hover:scale-105 active:scale-95 shadow-lg shadow-emerald-500/20">
                <i class="fa-solid fa-wallet"></i> <span id="wallet-text">Connect Wallet</span>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-lg glass-panel p-8 rounded-3xl border border-emerald-500/30 shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-display font-bold text-white mb-2 uppercase tracking-wide">Presale is Live</h1>
                <p class="text-sm text-gray-400 italic">1 SOL = 1,000,000 TLX</p>
            </div>

            <div class="space-y-4 mb-8">
                <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-700 focus-within:border-emerald-500 transition">
                    <div class="flex justify-between text-xs text-gray-400 mb-2">
                        <span>You Send (SOL)</span>
                        <span>Balance: <span id="sol-balance">0.00</span></span>
                    </div>
                    <div class="flex items-center">
                        <input type="number" id="sol-input" placeholder="0.0" step="0.1" class="w-full bg-transparent text-3xl font-bold text-white outline-none">
                        <span class="text-xl font-bold ml-2">SOL</span>
                    </div>
                </div>

                <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-700">
                    <div class="text-xs text-gray-400 mb-2">You Receive (TLX)</div>
                    <div class="flex items-center">
                        <input type="text" id="tlx-output" readonly placeholder="0" class="w-full bg-transparent text-3xl font-bold text-emerald-400 outline-none">
                        <span class="text-xl font-bold ml-2">TLX</span>
                    </div>
                </div>
            </div>

            <button id="buy-btn" disabled class="w-full bg-gray-700 text-gray-400 font-bold py-4 rounded-xl transition cursor-not-allowed uppercase tracking-widest">
                Connect Wallet to Buy
            </button>
        </div>
    </main>

    <script>
        // --- KONFIGURÁCIÓ ---
        const PROGRAM_ID = new anchor.web3.PublicKey("H1xcQBvXT2hrFKDEoYxyvR6Zpyk1SZRVhwVfYgdpNuFb");
        const ADMIN_WALLET = new anchor.web3.PublicKey("4iubzdpP14Mo32iRseD7nZEhP1RVLWjjwbsh228uBk3z");
        const TOKEN_MINT = new anchor.web3.PublicKey("5vxfqnLVETP6xqZAjebckEbRCkwyzHFoDUoBjXhxEqA3");
        const PRESALE_STATE = new anchor.web3.PublicKey("E8tLriUmunHVVPFS65E3rgzR2f1Smb2x7U2x9CBM1CQV");
        
        // Az általad küldött IDL JSON alapján
        const IDL = {
            "version": "0.1.0", "name": "tetralux_presale",
            "instructions": [
                { "name": "initialize", "accounts": [{ "name": "presaleState", "isMut": true, "isSigner": true }, { "name": "admin", "isMut": true, "isSigner": true }, { "name": "tokenMint", "isMut": false, "isSigner": false }, { "name": "systemProgram", "isMut": false, "isSigner": false }], "args": [{ "name": "rate", "type": "u64" }] },
                { "name": "togglePresale", "accounts": [{ "name": "presaleState", "isMut": true, "isSigner": false }, { "name": "admin", "isMut": false, "isSigner": true }], "args": [{ "name": "status", "type": "bool" }] },
                { "name": "buyTokens", "accounts": [{ "name": "presaleState", "isMut": true, "isSigner": false }, { "name": "adminWallet", "isMut": true, "isSigner": false }, { "name": "user", "isMut": true, "isSigner": true }, { "name": "vaultTokenAccount", "isMut": true, "isSigner": false }, { "name": "userTokenAccount", "isMut": true, "isSigner": false }, { "name": "vaultAuthority", "isMut": false, "isSigner": false }, { "name": "tokenProgram", "isMut": false, "isSigner": false }], "args": [{ "name": "solAmount", "type": "u64" }] }
            ]
        };

        const RATE = 1000000;
        let provider, program;

        // UI Frissítés
        const solInput = document.getElementById('sol-input');
        const tlxOutput = document.getElementById('tlx-output');
        const buyBtn = document.getElementById('buy-btn');

        solInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            tlxOutput.value = isNaN(val) ? "" : (val * RATE).toLocaleString();
            updateBuyButtonStatus();
        });

        function updateBuyButtonStatus() {
            if (window.solana && window.solana.isConnected && parseFloat(solInput.value) >= 0.01) {
                buyBtn.disabled = false;
                buyBtn.innerText = "Buy TLX Now";
                buyBtn.className = "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-500/20 uppercase tracking-widest cursor-pointer";
            } else if (window.solana && window.solana.isConnected) {
                buyBtn.disabled = true;
                buyBtn.innerText = "Enter Amount (Min 0.01)";
                buyBtn.className = "w-full bg-gray-700 text-gray-400 font-bold py-4 rounded-xl transition cursor-not-allowed uppercase tracking-widest";
            }
        }

        // Wallet Csatlakozás
        document.getElementById('wallet-btn').addEventListener('click', async () => {
            if (!window.solana) return alert("Phantom Wallet nem található!");
            
            try {
                const resp = await window.solana.connect();
                const connection = new anchor.web3.Connection(anchor.web3.clusterApiUrl('devnet'), "confirmed");
                
                provider = new anchor.AnchorProvider(window.solana, connection, { preflightCommitment: "confirmed" });
                program = new anchor.Program(IDL, PROGRAM_ID, provider);

                const balance = await connection.getBalance(resp.publicKey);
                document.getElementById('sol-balance').innerText = (balance / 1e9).toFixed(3) + " SOL";
                document.getElementById('wallet-text').innerText = resp.publicKey.toString().slice(0, 4) + '...' + resp.publicKey.toString().slice(-4);
                
                updateBuyButtonStatus();
            } catch (err) {
                console.error("Csatlakozási hiba:", err);
            }
        });

        // Vásárlás Indítása
        buyBtn.addEventListener('click', async () => {
            const amount = parseFloat(solInput.value);
            if (amount < 0.01 || amount > 10) return alert("A vásárlás 0.01 és 10 SOL között lehetséges!");

            buyBtn.innerText = "Processing...";
            buyBtn.disabled = true;

            try {
                const lamports = new anchor.BN(amount * 1e9);

                // PDA Authority kiszámítása
                const [vaultAuth] = await anchor.web3.PublicKey.findProgramAddress(
                    [Buffer.from("presale_vault")],
                    PROGRAM_ID
                );

                // ATA-k (Token számlák) meghatározása
                const userATA = await anchor.utils.token.associatedAddress({
                    mint: TOKEN_MINT,
                    owner: provider.wallet.publicKey
                });

                const vaultATA = await anchor.utils.token.associatedAddress({
                    mint: TOKEN_MINT,
                    owner: vaultAuth
                });

                // Okosszerződés hívás
                const tx = await program.methods
                    .buyTokens(lamports)
                    .accounts({
                        presaleState: PRESALE_STATE,
                        adminWallet: ADMIN_WALLET,
                        user: provider.wallet.publicKey,
                        vaultTokenAccount: vaultATA,
                        userTokenAccount: userATA,
                        vaultAuthority: vaultAuth,
                        tokenProgram: anchor.utils.token.TOKEN_PROGRAM_ID,
                    })
                    .rpc();

                alert("Sikeres vásárlás! Tranzakció ID: " + tx);
                location.reload();

            } catch (err) {
                console.error("Hiba a tranzakció során:", err);
                alert("Hiba történt: " + (err.msg || "Ellenőrizd a konzolt!"));
                updateBuyButtonStatus();
            }
        });
    </script>
</body>
</html>
